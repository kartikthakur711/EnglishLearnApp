services:
  db:
    image: postgres:16-alpine
    container_name: englishapp-db
    environment:
      POSTGRES_DB: englishapp
      POSTGRES_USER: englishapp
      POSTGRES_PASSWORD: englishapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U englishapp -d englishapp"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: englishapp-backend
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      DB_URL: jdbc:postgresql://db:5432/englishapp
      DB_USERNAME: englishapp
      DB_PASSWORD: englishapp
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CORS_ALLOWED_ORIGIN_PATTERNS: ${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:3000}
      AI_PROVIDER: ${AI_PROVIDER:-LOCAL}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: englishapp-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
