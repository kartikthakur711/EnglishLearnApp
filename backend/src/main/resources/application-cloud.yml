spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/englishapp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8080}

app:
  jwt-secret: ${JWT_SECRET:change-this-jwt-secret-to-a-very-long-32-byte-key}
  jwt-expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://your-frontend-domain.com}
  ai:
    provider: ${AI_PROVIDER:LOCAL}
    openai-api-key: ${OPENAI_API_KEY:}
    openai-model: ${OPENAI_MODEL:gpt-4o-mini}
