databases:
  - name: englishapp-db
    databaseName: englishapp
    user: englishapp
    plan: free

services:
  - type: web
    name: englishapp-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: cloud
      # --- Automatic Database Linking with JDBC Fix ---
      - key: DB_URL
        fromDatabase:
          name: englishapp-db
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: englishapp-db
          property: connectionString
        # This adds the "jdbc:" prefix required by Java/Spring Boot
        modifiers:
          - type: prepend
            value: "jdbc:"
      - key: DB_USERNAME
        fromDatabase:
          name: englishapp-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: englishapp-db
          property: password
      # --- Networking & Port Fix ---
      - key: PORT
        value: 10000
      # --- App Configuration ---
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://englishapp-frontend.onrender.com
      - key: AI_PROVIDER
        value: GROQ
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: englishapp-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://englishapp-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
